space_quota.settings:
  type: config_object
  label: 'Space Quota settings'
  mapping:
    max_quota_mb:
      type: integer
      label: 'Maximum disk quota (MB)'
    calculation_mode:
      type: string
      label: 'Quota calculation mode'
    warning_threshold:
      type: integer
      label: 'Warning threshold (%)'
    ignore_orphaned_files:
      type: boolean
      label: 'Ignore orphaned files'
    content_types:
      type: sequence
      label: 'Content types to restrict'
      sequence:
        type: string
        label: 'Content type'
    file_fields:
      type: sequence
      label: 'File fields to monitor'
      sequence:
        type: string
        label: 'Field name'